<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DSF v2 — MSDF Font Prototype</title>
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #0a0a0f;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            overflow: hidden;
        }

        header {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px 28px;
            background: rgba(10, 10, 15, 0.72);
            backdrop-filter: blur(16px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.06);
            z-index: 100;
        }

        .logo {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .18em;
            text-transform: uppercase;
            color: #fff;
        }

        .logo span {
            color: #7c6fff;
        }

        .badge {
            font-size: 11px;
            font-weight: 600;
            letter-spacing: .12em;
            text-transform: uppercase;
            color: #7c6fff;
            background: rgba(124, 111, 255, .12);
            border: 1px solid rgba(124, 111, 255, .35);
            border-radius: 20px;
            padding: 4px 12px;
        }

        .canvas-wrap {
            position: relative;
            height: calc(100vh - 56px);
            aspect-ratio: 9/16;
            margin-top: 56px;
            box-shadow: 0 0 0 1px rgba(124, 111, 255, .25), 0 0 60px 4px rgba(124, 111, 255, .15), 0 32px 80px rgba(0, 0, 0, .6);
            border-radius: 3px;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .corner {
            position: absolute;
            width: 20px;
            height: 20px;
            border-color: rgba(124, 111, 255, .6);
            border-style: solid;
            border-width: 0;
            pointer-events: none;
        }

        .corner.tl {
            top: 0;
            left: 0;
            border-top-width: 2px;
            border-left-width: 2px;
        }

        .corner.tr {
            top: 0;
            right: 0;
            border-top-width: 2px;
            border-right-width: 2px;
        }

        .corner.bl {
            bottom: 0;
            left: 0;
            border-bottom-width: 2px;
            border-left-width: 2px;
        }

        .corner.br {
            bottom: 0;
            right: 0;
            border-bottom-width: 2px;
            border-right-width: 2px;
        }

        #stats {
            position: absolute;
            bottom: 14px;
            left: 14px;
            font-size: 11px;
            font-weight: 500;
            letter-spacing: .06em;
            color: rgba(255, 255, 255, .55);
            background: rgba(0, 0, 0, .45);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, .08);
            border-radius: 8px;
            padding: 8px 12px;
            line-height: 1.8;
            pointer-events: none;
        }

        #loading {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            background: rgba(10, 10, 15, .9);
            color: rgba(255, 255, 255, .7);
            font-size: 13px;
            z-index: 10;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(124, 111, 255, .2);
            border-top-color: #7c6fff;
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">DSF <span>v2</span></div>
        <div class="badge">MSDF Font Prototype · 1080 × 1920</div>
    </header>

    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="glCanvas" width="1080" height="1920"></canvas>
        <div class="corner tl"></div>
        <div class="corner tr"></div>
        <div class="corner bl"></div>
        <div class="corner br"></div>
        <div id="stats">–</div>
        <div id="loading">
            <div class="spinner"></div><span id="loadMsg">Loading font data…</span>
        </div>
    </div>

    <script>
        'use strict';

        // ═══════════════════════════════════════════════════════════════
        // WebGL helpers
        // ═══════════════════════════════════════════════════════════════
        const canvas = document.getElementById('glCanvas');
        const gl = canvas.getContext('webgl', { antialias: true, alpha: false, powerPreference: 'high-performance' });
        if (!gl) { alert('WebGL not supported'); }

        // Enable OES_standard_derivatives for fwidth() anti-aliasing
        const extDeriv = gl.getExtension('OES_standard_derivatives');

        function mkShader(type, src) {
            const sh = gl.createShader(type);
            gl.shaderSource(sh, src); gl.compileShader(sh);
            if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS))
                throw new Error(gl.getShaderInfoLog(sh));
            return sh;
        }
        function mkProg(vs, fs) {
            const p = gl.createProgram();
            gl.attachShader(p, mkShader(gl.VERTEX_SHADER, vs));
            gl.attachShader(p, mkShader(gl.FRAGMENT_SHADER, fs));
            gl.linkProgram(p);
            if (!gl.getProgramParameter(p, gl.LINK_STATUS))
                throw new Error(gl.getProgramInfoLog(p));
            return p;
        }

        // ═══════════════════════════════════════════════════════════════
        // BACKGROUND — MSDF ring-expansion shader (benchmark)
        // ═══════════════════════════════════════════════════════════════
        const BG_VS = `
  attribute vec2 a_pos;
  varying   vec2 v_uv;
  void main() { v_uv = a_pos * .5 + .5; gl_Position = vec4(a_pos, 0., 1.); }
`;
        // ── Background: lightweight radial-wave pattern (replaces heavy SDF) ──
        // sin-only, no SDF shapes, ~70% lower GPU cost, same visual character.
        const BG_FS = `
  precision mediump float;
  varying vec2  v_uv;
  uniform float u_time;

  void main() {
    // Aspect-correct coords centred at (0,0)
    vec2  p   = v_uv - 0.5;
    p.y      *= 1.7778;          // 16/9 → square-ish domain for a 9:16 canvas
    float r   = length(p);
    float ang = atan(p.y, p.x);
    float t   = u_time;

    // Three overlapping radial ring waves — sin only, zero SDF cost
    float w1 = 0.5 + 0.5 * sin(r * 14.0  - t * 2.4);
    float w2 = 0.5 + 0.5 * sin(r *  9.0  - t * 1.7 + ang * 1.5 + sin(t * 0.8) * 1.2);
    float w3 = 0.5 + 0.5 * sin(r *  5.0  - t * 0.9 - ang * 0.7);

    // Indigo / violet / rose palette
    vec3 col = vec3(0.04, 0.03, 0.10)
             + vec3(0.62, 0.44, 1.00) * w1 * 0.32
             + vec3(0.95, 0.30, 0.55) * w2 * 0.20
             + vec3(0.20, 0.60, 0.90) * w3 * 0.14;

    col *= 1.0 - dot(p, p) * 2.2;                         // vignette
    col *= 0.97 + 0.03 * sin(v_uv.y * 1920.0 * 3.14159); // scanline grain

    gl_FragColor = vec4(col, 1.0);
  }
`;

        // ═══════════════════════════════════════════════════════════════
        // GLYPH — MSDF character shader
        // ═══════════════════════════════════════════════════════════════
        const GLYPH_VS = `
  attribute vec2 a_pos;
  attribute vec2 a_uv;
  varying   vec2 v_uv;
  void main() { v_uv = a_uv; gl_Position = vec4(a_pos, 0., 1.); }
`;
        // ── Glyph: reference MSDF anti-aliasing (Chlumský 2015) ──────────────
        const GLYPH_FS = (extDeriv ? '#extension GL_OES_standard_derivatives : enable\n' : '') + `
  precision highp float;
  varying vec2      v_uv;
  uniform sampler2D u_atlas;
  uniform vec3      u_color;
  uniform vec3      u_glow;
  uniform float     u_time;
  uniform vec2      u_atlasSize;  // atlas dimensions in texels  e.g. (256, 256)
  uniform float     u_spread;     // SDF spread in atlas pixels  e.g. 16.0

  float median(float r, float g, float b) { return max(min(r,g), min(max(r,g),b)); }

  // Chlumský 2015 §4.4: how many screen pixels cover the full SDF ramp.
  // unitRange  = SDF-value change per atlas texel = spread / atlasSize
  // screenTexSize = screen pixels per UV unit     = 1 / fwidth(v_uv)
  // pxRange    = half dot-product, clamped to ≥ 1.0
  float screenPxRange() {
    #ifdef GL_OES_standard_derivatives
      vec2 unitRange    = vec2(u_spread) / u_atlasSize;
      vec2 screenTexSz  = vec2(1.0) / fwidth(v_uv);
      return max(0.5 * dot(unitRange, screenTexSz), 1.0);
    #else
      return 4.0;   // safe fallback; tune per target device
    #endif
  }

  void main() {
    vec3  msd   = texture2D(u_atlas, v_uv).rgb;
    float sd    = median(msd.r, msd.g, msd.b);

    // Reference MSDF decode: exactly 1 screen pixel of AA ramp
    float pxRange = screenPxRange();
    float alpha   = clamp((sd - 0.5) * pxRange + 0.5, 0.0, 1.0);

    // Soft outer glow halo
    float halo    = clamp((sd - 0.28) * 4.5, 0.0, 1.0) * (1.0 - alpha) * 0.45;

    // Animated inner shimmer
    float shimmer = 0.5 + 0.5 * sin(u_time * 2.1 + v_uv.x * 8.0);
    vec3  innerCol = mix(u_color, vec3(1.0), shimmer * 0.22);

    vec3  finalCol = mix(u_glow, innerCol, alpha);
    float finalA   = alpha + halo;

    gl_FragColor = vec4(finalCol * finalA, finalA);
  }
`;

        // ═══════════════════════════════════════════════════════════════
        // Euclidean Distance Transform  (8-SSED, two-pass)
        // ═══════════════════════════════════════════════════════════════
        function computeEDT(init, w, h) {
            const d = new Float32Array(init);
            const S2 = Math.SQRT2;
            for (let y = 0; y < h; y++) for (let x = 0; x < w; x++) {
                const i = y * w + x;
                if (y > 0) {
                    if (x > 0) d[i] = Math.min(d[i], d[(y - 1) * w + (x - 1)] + S2);
                    d[i] = Math.min(d[i], d[(y - 1) * w + x] + 1);
                    if (x < w - 1) d[i] = Math.min(d[i], d[(y - 1) * w + (x + 1)] + S2);
                }
                if (x > 0) d[i] = Math.min(d[i], d[y * w + (x - 1)] + 1);
            }
            for (let y = h - 1; y >= 0; y--) for (let x = w - 1; x >= 0; x--) {
                const i = y * w + x;
                if (y < h - 1) {
                    if (x < w - 1) d[i] = Math.min(d[i], d[(y + 1) * w + (x + 1)] + S2);
                    d[i] = Math.min(d[i], d[(y + 1) * w + x] + 1);
                    if (x > 0) d[i] = Math.min(d[i], d[(y + 1) * w + (x - 1)] + S2);
                }
                if (x < w - 1) d[i] = Math.min(d[i], d[y * w + (x + 1)] + 1);
            }
            return d;
        }

        // Build one SDF channel from a rendered glyph with pixel offset (ox, oy)
        function buildChannel(char, fontSpec, W, H, spread, ox, oy) {
            const c = Object.assign(document.createElement('canvas'), { width: W, height: H });
            const ctx = c.getContext('2d');
            ctx.fillStyle = '#000'; ctx.fillRect(0, 0, W, H);
            ctx.fillStyle = '#fff'; ctx.font = fontSpec;
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(char, W / 2 + ox, H / 2 + oy);

            const px = ctx.getImageData(0, 0, W, H).data;
            const n = W * H;
            const d1 = new Float32Array(n), d0 = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                // Threshold 200 (not 127) to treat Canvas2D anti-aliased edge pixels
                // as OUTSIDE.  Canvas2D smooths text edges, so pixels with alpha
                // 128-199 are "soft edge" — including them as inside causes the EDT
                // to misplace the edge at sharp corners (like the crotch of 'A').
                const inside = px[i * 4] > 200;
                d1[i] = inside ? 0 : 9999;
                d0[i] = inside ? 9999 : 0;
            }
            // ed1: dist to nearest glyph pixel  (0 inside  → large outside)
            // ed0: dist to nearest non-glyph px (0 outside → large inside)
            const ed1 = computeEDT(d1, W, H);
            const ed0 = computeEDT(d0, W, H);
            const sdf = new Float32Array(n);
            for (let i = 0; i < n; i++) {
                sdf[i] = Math.max(0, Math.min(1, 0.5 - (ed0[i] - ed1[i]) / (spread * 2)));
            }
            return sdf;
        }

        // ───────────────────────────────────────────────────────────────
        // Generate full MSDF RGBA atlas
        // ───────────────────────────────────────────────────────────────
        // Corner-artifact fix: instead of shifting all channels horizontally
        // (which creates fighting gradients at sharp corners like the bottom of 'A'),
        // we use THREE DIRECTIONS 120° apart — simulating msdfgen's edge-color assignment.
        //
        // R → 0°   (right)          B→\ /←G
        // G → 120° (lower-left)         R→
        // B → 240° (upper-left)     (equidistant ⇒ minimal corner cancellation)
        //
        // At any sharp corner the three channels sample from different approach
        // directions, so at least two will agree on the correct distance.
        // The Chlumský median-of-three decode then picks the safe value.
        function generateMSDFAtlas(char, fontSpec, W, H, spread) {
            const off = spread * 0.32;  // offset magnitude: ~32% of spread (in atlas px)
            // Angles: 0°, 120°, 240°
            const A0 = 0;
            const A1 = Math.PI * 2 / 3;
            const A2 = Math.PI * 4 / 3;
            const sdfR = buildChannel(char, fontSpec, W, H, spread,
                Math.cos(A0) * off, Math.sin(A0) * off);
            const sdfG = buildChannel(char, fontSpec, W, H, spread,
                Math.cos(A1) * off, Math.sin(A1) * off);
            const sdfB = buildChannel(char, fontSpec, W, H, spread,
                Math.cos(A2) * off, Math.sin(A2) * off);

            const rgba = new Uint8Array(W * H * 4);
            for (let i = 0; i < W * H; i++) {
                rgba[i * 4 + 0] = sdfR[i] * 255 | 0;
                rgba[i * 4 + 1] = sdfG[i] * 255 | 0;
                rgba[i * 4 + 2] = sdfB[i] * 255 | 0;
                rgba[i * 4 + 3] = 255;
            }
            return rgba;
        }

        // Upload atlas → WebGL texture
        function uploadTexture(rgba, W, H) {
            const tex = gl.createTexture();
            gl.bindTexture(gl.TEXTURE_2D, tex);
            gl.texImage2D(gl.TEXTURE_2D, 0, gl.RGBA, W, H, 0, gl.RGBA, gl.UNSIGNED_BYTE, rgba);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MIN_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_MAG_FILTER, gl.LINEAR);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_S, gl.CLAMP_TO_EDGE);
            gl.texParameteri(gl.TEXTURE_2D, gl.TEXTURE_WRAP_T, gl.CLAMP_TO_EDGE);
            return tex;
        }

        // ═══════════════════════════════════════════════════════════════
        // Build quad vertices  (clip-space pos + atlas UV)
        // ═══════════════════════════════════════════════════════════════
        function buildGlyphQuad(CW, CH, scale) {
            // Glyph is rendered as a square occupying `scale` of canvas height
            const glH = CH * scale;
            const glW = glH;                       // square atlas → square quad
            const lt = (CW - glW) / 2, tp = (CH - glH) / 2;
            const rb = lt + glW, bt = tp + glH;

            function cx(px) { return (px / CW) * 2 - 1; }
            function cy(py) { return -(py / CH) * 2 + 1; }

            // Triangle strip: TL TR BL BR
            return new Float32Array([
                cx(lt), cy(tp), 0, 0,
                cx(rb), cy(tp), 1, 0,
                cx(lt), cy(bt), 0, 1,
                cx(rb), cy(bt), 1, 1,
            ]);
        }

        // ═══════════════════════════════════════════════════════════════
        // HiDPI: back-buffer = actual physical pixels of the canvas display area
        // ═══════════════════════════════════════════════════════════════
        // Rather than scaling the logical design resolution (1080×1920) by DPR,
        // we measure the actual CSS display box of the canvas element and multiply
        // by DPR. This gives true 1:1 physical-pixel rendering regardless of
        // viewport size, preventing both blurriness and wasted overdraw.
        const CANVAS_W = 1080;  // logical design width
        const CANVAS_H = 1920;  // logical design height

        let physW = 1;
        let physH = 1;

        function resizeToDisplay() {
            const dpr = window.devicePixelRatio || 1;
            const rect = canvas.getBoundingClientRect();
            if (rect.width === 0 || rect.height === 0) return;  // skip if not laid out
            const nw = Math.round(rect.width * dpr);
            const nh = Math.round(rect.height * dpr);
            if (nw === physW && nh === physH) return;  // no-op if unchanged
            physW = nw; physH = nh;
            canvas.width = physW;
            canvas.height = physH;
            console.log(`[HiDPI] DPR=${dpr.toFixed(2)} | CSS=${Math.round(rect.width)}×${Math.round(rect.height)} | backing=${physW}×${physH}`);
        }

        new ResizeObserver(resizeToDisplay).observe(canvas);
        resizeToDisplay();  // also call immediately for the initial size

        // ═══════════════════════════════════════════════════════════════
        // Main async init
        // ═══════════════════════════════════════════════════════════════
        async function main() {
            const loadMsg = document.getElementById('loadMsg');

            // 1. Load JSON font data
            loadMsg.textContent = 'Loading font data…';
            const fontData = await fetch('assets/fonts/demo-msdf.json').then(r => r.json());
            const { font, atlas, display } = fontData;
            const dispChar = display.text || 'A';
            const dispColor = display.color || [1, 1, 1];
            const dispGlow = display.glowColor || [0.48, 0.43, 1.0];
            const dispScale = display.scale || 0.42;

            // 2. Generate MSDF atlas (CPU)
            loadMsg.textContent = 'Generating MSDF atlas…';
            await new Promise(r => setTimeout(r, 0));   // yield → repaint spinner
            const fontSpec = `bold ${font.size}px ${font.family}`;
            const atlasRGBA = generateMSDFAtlas(dispChar, fontSpec, atlas.width, atlas.height, font.spread);

            // 3. Upload texture
            loadMsg.textContent = 'Uploading texture…';
            const atlasTex = uploadTexture(atlasRGBA, atlas.width, atlas.height);

            // ── Compile programs ──────────────────────────────────────
            const bgProg = mkProg(BG_VS, BG_FS);
            const glyphProg = mkProg(GLYPH_VS, GLYPH_FS);

            // ── Background geometry ───────────────────────────────────
            const bgVBO = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, bgVBO);
            gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 1, -1, -1, 1, 1, 1]), gl.STATIC_DRAW);

            // ── Glyph geometry (built in logical 1080×1920 space) ─────
            const glyphVBO = gl.createBuffer();
            gl.bindBuffer(gl.ARRAY_BUFFER, glyphVBO);
            gl.bufferData(gl.ARRAY_BUFFER, buildGlyphQuad(CANVAS_W, CANVAS_H, dispScale), gl.STATIC_DRAW);

            // ── Uniform locations ─────────────────────────────────────
            const bg = {
                prog: bgProg,
                aPos: gl.getAttribLocation(bgProg, 'a_pos'),
                uTime: gl.getUniformLocation(bgProg, 'u_time'),
                // simplified BG shader has no u_res
            };
            const gh = {
                prog: glyphProg,
                aPos: gl.getAttribLocation(glyphProg, 'a_pos'),
                aUV: gl.getAttribLocation(glyphProg, 'a_uv'),
                uAtlas: gl.getUniformLocation(glyphProg, 'u_atlas'),
                uColor: gl.getUniformLocation(glyphProg, 'u_color'),
                uGlow: gl.getUniformLocation(glyphProg, 'u_glow'),
                uTime: gl.getUniformLocation(glyphProg, 'u_time'),
                uAtlasSize: gl.getUniformLocation(glyphProg, 'u_atlasSize'),
                uSpread: gl.getUniformLocation(glyphProg, 'u_spread'),
            };

            // Hide loading overlay
            document.getElementById('loading').style.display = 'none';

            // ── Render loop ───────────────────────────────────────────
            let frames = 0, lastT = performance.now(), fps = 0;
            const stats = document.getElementById('stats');

            function render(now) {
                const t = now * 0.001;
                const dpr = window.devicePixelRatio || 1;

                // Physical pixel dimensions may have changed (DPR change or first frame)
                gl.viewport(0, 0, physW, physH);

                // ── Pass 1: background rings ───────────────────────────
                gl.disable(gl.BLEND);
                gl.useProgram(bg.prog);
                gl.bindBuffer(gl.ARRAY_BUFFER, bgVBO);
                gl.enableVertexAttribArray(bg.aPos);
                gl.vertexAttribPointer(bg.aPos, 2, gl.FLOAT, false, 0, 0);
                gl.uniform1f(bg.uTime, t);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                // ── Pass 2: MSDF character ─────────────────────────────
                gl.enable(gl.BLEND);
                gl.blendFunc(gl.ONE, gl.ONE_MINUS_SRC_ALPHA);  // premultiplied alpha
                gl.useProgram(gh.prog);
                gl.bindBuffer(gl.ARRAY_BUFFER, glyphVBO);
                gl.enableVertexAttribArray(gh.aPos);
                gl.vertexAttribPointer(gh.aPos, 2, gl.FLOAT, false, 4 * 4, 0);
                gl.enableVertexAttribArray(gh.aUV);
                gl.vertexAttribPointer(gh.aUV, 2, gl.FLOAT, false, 4 * 4, 2 * 4);
                gl.activeTexture(gl.TEXTURE0);
                gl.bindTexture(gl.TEXTURE_2D, atlasTex);
                gl.uniform1i(gh.uAtlas, 0);
                gl.uniform3fv(gh.uColor, dispColor);
                gl.uniform3fv(gh.uGlow, dispGlow);
                gl.uniform1f(gh.uTime, t);
                // Chlumský screenPxRange uniforms — constant per frame, set each draw
                gl.uniform2f(gh.uAtlasSize, atlas.width, atlas.height);
                gl.uniform1f(gh.uSpread, font.spread);
                gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

                // ── Stats ──────────────────────────────────────────────
                frames++;
                if (now - lastT >= 500) {
                    fps = Math.round(frames * 1000 / (now - lastT));
                    frames = 0; lastT = now;
                    const dpr = window.devicePixelRatio || 1;
                    const css = canvas.getBoundingClientRect();
                    stats.innerHTML =
                        `fps: <b>${fps}</b><br>` +
                        `dpr: <b>${dpr.toFixed(2)}x</b><br>` +
                        `css: <b>${Math.round(css.width)}×${Math.round(css.height)}</b><br>` +
                        `backing: <b>${physW}×${physH}</b><br>` +
                        `spread: <b>${font.spread}px</b>`;
                }

                requestAnimationFrame(render);
            }
            requestAnimationFrame(render);
        }

        main().catch(err => {
            document.getElementById('loadMsg').textContent = '⚠ ' + err.message;
            console.error(err);
        });
    </script>
</body>

</html>
