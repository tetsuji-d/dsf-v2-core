<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DSF v2 — MSDF Benchmark</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    /* ─── Header ─────────────────────────────────────────── */
    header {
      position: fixed;
      top: 0; left: 0; right: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px;
      background: rgba(10, 10, 15, 0.72);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      z-index: 100;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #fff;
    }
    .logo span { color: #7c6fff; }

    .badge {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #7c6fff;
      background: rgba(124,111,255,0.12);
      border: 1px solid rgba(124,111,255,0.35);
      border-radius: 20px;
      padding: 4px 12px;
    }

    /* ─── Canvas wrapper ──────────────────────────────────── */
    .canvas-wrap {
      position: relative;
      /* 1080×1920 → 9:16 → fill viewport height minus header  */
      height: calc(100vh - 56px);
      aspect-ratio: 9 / 16;
      margin-top: 56px; /* header height */
      box-shadow:
        0 0 0 1px rgba(124,111,255,0.25),
        0 0 60px 4px rgba(124,111,255,0.15),
        0 32px 80px rgba(0,0,0,0.6);
      border-radius: 3px;
      overflow: hidden;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    /* Corner marks */
    .corner {
      position: absolute;
      width: 20px; height: 20px;
      border-color: rgba(124,111,255,0.6);
      border-style: solid;
      border-width: 0;
      pointer-events: none;
    }
    .corner.tl { top:0; left:0;  border-top-width:2px; border-left-width:2px; }
    .corner.tr { top:0; right:0; border-top-width:2px; border-right-width:2px; }
    .corner.bl { bottom:0; left:0;  border-bottom-width:2px; border-left-width:2px; }
    .corner.br { bottom:0; right:0; border-bottom-width:2px; border-right-width:2px; }

    /* ─── Stats overlay ───────────────────────────────────── */
    #stats {
      position: absolute;
      bottom: 14px;
      left: 14px;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.06em;
      color: rgba(255,255,255,0.55);
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 8px 12px;
      line-height: 1.8;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <!-- ─── Header ──────────────────────────────────────────── -->
  <header>
    <div class="logo">DSF <span>v2</span></div>
    <div class="badge">MSDF Benchmark · 1080 × 1920</div>
  </header>

  <!-- ─── Canvas ──────────────────────────────────────────── -->
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="glCanvas" width="1080" height="1920"></canvas>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div id="stats">fps: –<br>time: –<br>ring: –</div>
  </div>

  <!-- ─── Raw WebGL / MSDF Simulation ─────────────────────── -->
  <script>
  (function () {
    'use strict';

    /* ── 1. WebGL setup ────────────────────────────────────── */
    const canvas = document.getElementById('glCanvas');
    const gl = canvas.getContext('webgl', {
      antialias: true,
      alpha: false,
      powerPreference: 'high-performance'
    });
    if (!gl) { alert('WebGL not supported'); return; }

    /* ── 2. Shaders ────────────────────────────────────────── */
    /*
     * Vertex shader — full-screen quad via gl_VertexID trick
     * (or classic attribute buffer).
     */
    const VS = `
      attribute vec2 a_pos;
      varying   vec2 v_uv;
      void main() {
        v_uv        = a_pos * 0.5 + 0.5;   // [0,1]
        gl_Position = vec4(a_pos, 0.0, 1.0);
      }
    `;

    /*
     * Fragment shader — MSDF-style simulation.
     *
     * Classic MSDF decomposes a shape's SDF into three colour
     * channels so that a median-of-three reconstruction removes
     * pseudo-distance artefacts.  Here we simulate the visual
     * signature of MSDF rendering: concentric ring patterns per
     * channel (R / G / B offset by ±δ), combined with
     * median-of-three anti-aliasing, and animated so the rings
     * expand outward continuously.
     *
     * Pattern details
     * ───────────────
     * • The "SDF" of multiple overlapping ellipses / boxes is
     *   summed to build a rich, continuously-changing distance
     *   field (like a real MSDF atlas under animation).
     * • Each of R, G, B samples the distance field at slightly
     *   different radii → replicates the three-channel encoding.
     * • A median(R,G,B) pass mirrors the MSDF decoder step.
     * • Smooth ring bands + glow simulate the rendered glyphs.
     */
    const FS = `
      precision highp float;
      varying vec2  v_uv;

      uniform float u_time;
      uniform vec2  u_res;   /* canvas resolution in pixels */

      /* ── helpers ─────────────────────────────────────────── */
      float median3(float a, float b, float c) {
        return max(min(a,b), min(max(a,b),c));
      }

      /* smooth step for anti-aliased edges */
      float edge(float d, float w) {
        return smoothstep(-w, w, d);
      }

      /* signed distance to an ellipse centred at p */
      float sdEllipse(vec2 p, vec2 ab) {
        p = abs(p);
        if (p.x > p.y) { p = p.yx; ab = ab.yx; }
        float l = ab.y * ab.y - ab.x * ab.x;
        float m = ab.x * p.x / l;
        float n = ab.y * p.y / l;
        float m2 = m*m; float n2 = n*n;
        float c = (m2+n2-1.0)/3.0;
        float c3 = c*c*c;
        float q = c3 + m2*n2*2.0;
        float d = c3 + m2*n2;
        float g = m + m*n2;
        float co;
        if (d < 0.0) {
          float h = acos(q/c3)/3.0;
          float s = cos(h);
          float t = sin(h)*sqrt(3.0);
          float rx = sqrt(-c*(s+t+2.0)+m2);
          float ry = sqrt(-c*(s-t+2.0)+m2);
          co = (ry + sign(l)*rx + abs(g)/(rx*ry) - m)/2.0;
        } else {
          float h = 2.0*m*n*sqrt(d);
          float s = sign(q+h)*pow(abs(q+h),0.333);
          float u2 = sign(q-h)*pow(abs(q-h),0.333);
          float rx = -s - u2 - c*4.0 + 2.0*m2;
          float ry = (s  - u2)*sqrt(3.0);
          float rm = sqrt(rx*rx+ry*ry);
          co = (ry/sqrt(rm-rx)+2.0*g/rm-m)/2.0;
        }
        vec2 r = ab * vec2(co, sqrt(1.0-co*co));
        return length(r-p) * sign(p.y-r.y);
      }

      /* signed distance to an oriented box */
      float sdBox(vec2 p, vec2 b) {
        vec2 d = abs(p) - b;
        return length(max(d,0.0)) + min(max(d.x,d.y),0.0);
      }

      /* ── procedural MSDF distance field ──────────────────── */
      float msdfField(vec2 uv, float ch_offset) {
        /* map uv → "world" coords in [-1,1] range, aspect-correct */
        float aspect = u_res.x / u_res.y;   /* ~0.5625 for 9:16 */
        vec2 p = (uv - 0.5) * vec2(1.0, 1.0/aspect);  /* square domain */

        float t = u_time * 0.28;
        float d = 1e9;

        /* ── ring 1: central pulsing ellipse ── */
        vec2 p1 = p;
        float a1 = t * 0.4;
        p1 = vec2(p1.x*cos(a1)-p1.y*sin(a1),
                  p1.x*sin(a1)+p1.y*cos(a1));
        d = min(d, sdEllipse(p1, vec2(0.28 + ch_offset*0.012,
                                      0.18 + ch_offset*0.008)));

        /* ── ring 2: orbiting box ── */
        float orb = t * 0.55;
        vec2 centre2 = vec2(cos(orb)*0.22, sin(orb)*0.22);
        vec2 p2 = p - centre2;
        float a2 = t * 0.7 + ch_offset * 0.15;
        p2 = vec2(p2.x*cos(a2)-p2.y*sin(a2),
                  p2.x*sin(a2)+p2.y*cos(a2));
        d = min(d, sdBox(p2, vec2(0.11 + ch_offset*0.009,
                                  0.11 + ch_offset*0.007)));

        /* ── ring 3: counter-rotating ellipse ── */
        float orb3 = -t * 0.38 + 2.094;
        vec2 centre3 = vec2(cos(orb3)*0.30, sin(orb3)*0.30);
        vec2 p3 = p - centre3;
        float a3 = -t * 0.52 + ch_offset * 0.2;
        p3 = vec2(p3.x*cos(a3)-p3.y*sin(a3),
                  p3.x*sin(a3)+p3.y*cos(a3));
        d = min(d, sdEllipse(p3, vec2(0.09 + ch_offset*0.007,
                                      0.14 + ch_offset*0.009)));

        /* ── ring 4: small fast orbiter ── */
        float orb4 = t * 1.1 + 4.189;
        vec2 centre4 = vec2(cos(orb4)*0.18, sin(orb4*1.3)*0.22);
        vec2 p4 = p - centre4;
        d = min(d, sdBox(p4, vec2(0.055 + ch_offset*0.005,
                                  0.085 + ch_offset*0.005)));

        /* ── ring 5: large slow background ellipse ── */
        float a5 = t * 0.12;
        vec2 p5 = vec2(p.x*cos(a5)-p.y*sin(a5),
                       p.x*sin(a5)+p.y*cos(a5));
        d = min(d, sdEllipse(p5, vec2(0.52 + ch_offset*0.014,
                                      0.38 + ch_offset*0.010)));

        return d;
      }

      /* ── expanding ring function ─────────────────────────── */
      /*
       * Converts a signed distance into an expanding-ring
       * pattern — the visual hallmark of MSDF glyph atlases
       * when seen with scrolling / zoom animation.
       */
      float rings(float d, float speed, float freq, float pw) {
        /* band = repeating rings that travel outward */
        float phase  = d * freq - u_time * speed;
        float band   = 0.5 + 0.5 * sin(phase * 6.2832);
        /* narrow the ring with a power curve */
        band = pow(band, pw);
        /* fade toward zero outside the shape boundary */
        float mask   = 1.0 - smoothstep(-0.02, 0.06, d);
        float glow   = exp(-max(d,0.0) * 14.0) * 0.6;
        return band * (mask + 0.35) + glow;
      }

      void main() {
        float px = 1.0 / u_res.y;   /* one pixel in uv space */

        /* ── per-channel SDF (MSDF offset trick) ── */
        float dR = msdfField(v_uv, -1.0);
        float dG = msdfField(v_uv,  0.0);
        float dB = msdfField(v_uv,  1.0);

        /* ── ring visuals per channel ── */
        float r = rings(dR, 0.55, 3.2, 3.0);
        float g = rings(dG, 0.52, 3.2, 3.0);
        float b = rings(dB, 0.49, 3.2, 3.0);

        /* ── MSDF median decode (anti-alias artefact removal) ── */
        float med = median3(r, g, b);

        /* blend individual channels with median for MSDF look */
        vec3 col = vec3(r, g, b);
        col = mix(col, vec3(med), 0.45);

        /* ── colour grade ──────────────────────────────────── */
        /* deep indigo base with chromatic ring separation */
        vec3 palette_dark  = vec3(0.04, 0.03, 0.10);
        vec3 palette_r     = vec3(0.95, 0.30, 0.55);
        vec3 palette_g     = vec3(0.45, 0.82, 0.95);
        vec3 palette_b     = vec3(0.62, 0.44, 1.00);

        vec3 final = palette_dark
          + palette_r * col.r * 0.7
          + palette_g * col.g * 0.55
          + palette_b * col.b * 0.75;

        /* ── vignette ──────────────────────────────────────── */
        float aspect = u_res.x / u_res.y;
        vec2 vig_uv = (v_uv - 0.5) * vec2(aspect, 1.0);
        float vig = 1.0 - dot(vig_uv, vig_uv) * 1.8;
        final *= clamp(vig, 0.0, 1.0);

        /* ── subtle scanlines (CRT aesthetics for depth) ── */
        float scan = 0.96 + 0.04 * sin(v_uv.y * u_res.y * 3.14159);
        final *= scan;

        gl_FragColor = vec4(final, 1.0);
      }
    `;

    /* ── 3. Compile & link ─────────────────────────────────── */
    function compileShader(type, src) {
      const sh = gl.createShader(type);
      gl.shaderSource(sh, src);
      gl.compileShader(sh);
      if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
        throw new Error('Shader error:\n' + gl.getShaderInfoLog(sh));
      }
      return sh;
    }

    const prog = gl.createProgram();
    gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   VS));
    gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, FS));
    gl.linkProgram(prog);
    if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
      throw new Error('Link error:\n' + gl.getProgramInfoLog(prog));
    }
    gl.useProgram(prog);

    /* ── 4. Full-screen quad geometry ─────────────────────── */
    const vbo = gl.createBuffer();
    gl.bindBuffer(gl.ARRAY_BUFFER, vbo);
    gl.bufferData(gl.ARRAY_BUFFER,
      new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),
      gl.STATIC_DRAW);

    const aPos = gl.getAttribLocation(prog, 'a_pos');
    gl.enableVertexAttribArray(aPos);
    gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

    /* ── 5. Uniform locations ──────────────────────────────── */
    const uTime = gl.getUniformLocation(prog, 'u_time');
    const uRes  = gl.getUniformLocation(prog, 'u_res');

    gl.uniform2f(uRes, canvas.width, canvas.height);

    /* ── 6. Stats / FPS counter ────────────────────────────── */
    const stats   = document.getElementById('stats');
    let   frames  = 0;
    let   lastFPS = performance.now();
    let   fps     = 0;

    /* ── 7. Render loop ────────────────────────────────────── */
    function render(now) {
      const t = now * 0.001;   /* seconds */

      gl.viewport(0, 0, canvas.width, canvas.height);
      gl.uniform1f(uTime, t);
      gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);

      /* fps */
      frames++;
      if (now - lastFPS >= 500) {
        fps     = Math.round(frames * 1000 / (now - lastFPS));
        frames  = 0;
        lastFPS = now;

        /* ring count = how many full expansions have happened */
        const rings = Math.floor(t * 0.52 * 3.2) % 99;
        stats.innerHTML =
          `fps: <b>${fps}</b><br>` +
          `time: <b>${t.toFixed(1)}s</b><br>` +
          `ring: <b>${rings}</b>`;
      }

      requestAnimationFrame(render);
    }
    requestAnimationFrame(render);

  })();
  </script>
</body>
</html>
